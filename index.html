<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Lot Calc</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#0c0c0c">
<style>
:root {
  --bg: #0c0c0c;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: #2a2a2a;
  --green: #4ade80;
  --green-dim: #0f1f0f;
  --yellow: #facc15;
  --red: #ef4444;
  --text: #e8e8e0;
  --muted: #777;
  --faint: #444;
  --radius: 14px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
}

.app-header {
  padding: 18px 20px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-text .title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
.header-text .sub { font-size: 12px; color: var(--muted); margin-top: 1px; letter-spacing: 0.01em; }
.reset-btn {
  background: var(--surface2);
  border: none;
  color: var(--muted);
  font-size: 13px;
  font-family: inherit;
  padding: 8px 16px;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.12s;
  touch-action: manipulation;
  min-height: 36px;
}
.reset-btn:active { background: var(--border); color: var(--text); }

.scroll-body {
  flex: 1;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  max-width: 560px;
  width: 100%;
  margin: 0 auto;
}

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--faint);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* instrument tiles */
.instr-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.instr-tile {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 14px;
  cursor: pointer;
  text-align: left;
  font-family: inherit;
  transition: border-color 0.12s, background 0.12s;
  touch-action: manipulation;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.instr-tile:active { transform: scale(0.96); transition: transform 0.08s; }
.instr-tile.active { border-color: var(--green); background: var(--green-dim); }
.instr-tile .t-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.2px; }
.instr-tile .t-sub  { font-size: 12px; color: var(--muted); margin-top: 3px; }
.instr-tile.active .t-name { color: var(--green); }
.instr-tile.active .t-sub  { color: #3a7a50; }

/* input list card */
.input-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.irow {
  display: flex;
  align-items: center;
  min-height: 56px;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
  transition: background 0.1s;
}
.irow:last-child { border-bottom: none; }
.irow:focus-within { background: #141a14; }
.irow-label {
  font-size: 15px;
  color: var(--muted);
  flex-shrink: 0;
  min-width: 90px;
}
.irow input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 17px;
  font-weight: 500;
  font-family: inherit;
  text-align: right;
  padding: 0;
  min-width: 0;
  -moz-appearance: textfield;
}
.irow input::-webkit-inner-spin-button,
.irow input::-webkit-outer-spin-button { -webkit-appearance: none; }
.irow input::placeholder { color: var(--faint); font-weight: 400; }
.irow-unit {
  font-size: 14px;
  color: var(--faint);
  flex-shrink: 0;
  margin-left: 4px;
}

/* price row pair */
.price-pair {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.price-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px 16px;
  transition: background 0.1s;
}
.price-card:focus-within { background: #141a14; border-color: #3a3a3a; }
.price-card-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  color: var(--muted);
}
.price-card-label.sl { color: #c0503a; }
.price-card input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 20px;
  font-weight: 600;
  font-family: inherit;
  padding: 0;
  -moz-appearance: textfield;
}
.price-card input::-webkit-inner-spin-button,
.price-card input::-webkit-outer-spin-button { -webkit-appearance: none; }
.price-card input::placeholder { color: var(--faint); font-weight: 400; font-size: 18px; }

/* CTA */
.calc-btn {
  width: 100%;
  background: var(--green);
  color: #000;
  font-family: inherit;
  font-size: 17px;
  font-weight: 700;
  padding: 18px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  letter-spacing: -0.2px;
  touch-action: manipulation;
  transition: opacity 0.12s, transform 0.08s;
}
.calc-btn:active { opacity: 0.82; transform: scale(0.98); }

/* error */
.error-bar {
  background: #1c0808;
  border: 1px solid #5a1a1a;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 14px;
  color: var(--red);
  display: none;
  align-items: center;
  gap: 10px;
}
.error-bar.show { display: flex; }

/* result */
.result-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: none;
}
.result-card.show {
  display: block;
  animation: popIn 0.28s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.95) translateY(10px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}

.res-hero {
  padding: 22px 20px 18px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid var(--border);
}
.res-hero-l {}
.res-label { font-size: 11px; font-weight: 700; color: var(--faint); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 6px; }
.res-big { font-size: 56px; font-weight: 800; color: var(--green); letter-spacing: -3px; line-height: 1; }
.res-unit { font-size: 20px; font-weight: 400; color: var(--green); opacity: 0.45; margin-left: 3px; letter-spacing: 0; }
.res-note { font-size: 11px; color: var(--faint); margin-top: 7px; display: none; }

.res-badge {
  background: #181400;
  border: 1px solid #302800;
  border-radius: 12px;
  padding: 12px 16px;
  text-align: right;
  flex-shrink: 0;
}
.res-badge-label { font-size: 10px; font-weight: 700; color: #555; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.res-badge-val { font-size: 24px; font-weight: 800; color: var(--yellow); letter-spacing: -0.5px; line-height: 1.1; }

.res-rows {}
.res-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.res-row:last-child { border-bottom: none; }
.res-row-k { font-size: 14px; color: var(--muted); }
.res-row-v { font-size: 14px; font-weight: 600; color: var(--text); text-align: right; max-width: 55%; }

.spacer { height: 40px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-text">
    <div class="title">Lot Calculator</div>
    <div class="sub">position sizing &amp; risk management</div>
  </div>
  <button class="reset-btn" onclick="resetAll()">Reset</button>
</div>

<div class="scroll-body">

  <div>
    <div class="section-label">Strumento</div>
    <div class="instr-grid">
      <button class="instr-tile" data-key="XAUUSD" onclick="pickInstr(this)">
        <span class="t-name">XAUUSD</span>
        <span class="t-sub">Gold / USD</span>
      </button>
      <button class="instr-tile" data-key="BTCUSD" onclick="pickInstr(this)">
        <span class="t-name">BTCUSD</span>
        <span class="t-sub">Bitcoin / USD</span>
      </button>
      <button class="instr-tile" data-key="USOIL" onclick="pickInstr(this)">
        <span class="t-name">USOIL</span>
        <span class="t-sub">Crude Oil Cash</span>
      </button>
      <button class="instr-tile" data-key="US500" onclick="pickInstr(this)">
        <span class="t-name">US500</span>
        <span class="t-sub">S&amp;P 500 Cash</span>
      </button>
    </div>
  </div>

  <div>
    <div class="section-label">Conto e rischio</div>
    <div class="input-card">
      <div class="irow">
        <label class="irow-label" for="capital">Capitale</label>
        <input id="capital" type="number" inputmode="decimal" placeholder="10000" min="0" step="any" autocomplete="off">
        <span class="irow-unit">USD</span>
      </div>
      <div class="irow">
        <label class="irow-label" for="risk">Rischio</label>
        <input id="risk" type="number" inputmode="decimal" placeholder="1.00" min="0.01" max="100" step="any" autocomplete="off">
        <span class="irow-unit">%</span>
      </div>
    </div>
  </div>

  <div>
    <div class="section-label">Prezzi</div>
    <div class="price-pair">
      <div class="price-card">
        <div class="price-card-label">Entry</div>
        <input id="entry" type="number" inputmode="decimal" placeholder="0.00" min="0" step="any" autocomplete="off">
      </div>
      <div class="price-card">
        <div class="price-card-label sl">SL / Exit</div>
        <input id="exitp" type="number" inputmode="decimal" placeholder="0.00" min="0" step="any" autocomplete="off">
      </div>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">Calcola lottaggio</button>

  <div class="error-bar" id="err-bar">
    <span style="font-size:16px;flex-shrink:0;">&#9888;</span>
    <span id="err-msg"></span>
  </div>

  <div class="result-card" id="res-card">
    <div class="res-hero">
      <div class="res-hero-l">
        <div class="res-label">Lottaggio consigliato</div>
        <div>
          <span class="res-big" id="res-lot">—</span><span class="res-unit">lots</span>
        </div>
        <div class="res-note" id="res-note"></div>
      </div>
      <div class="res-badge">
        <div class="res-badge-label">Dollar risk</div>
        <div class="res-badge-val" id="res-risk">—</div>
      </div>
    </div>
    <div class="res-rows">
      <div class="res-row">
        <span class="res-row-k">Strumento</span>
        <span class="res-row-v" id="r-instr">—</span>
      </div>
      <div class="res-row">
        <span class="res-row-k">Distanza SL</span>
        <span class="res-row-v" id="r-pips">—</span>
      </div>
      <div class="res-row">
        <span class="res-row-k">Valore pip / lot</span>
        <span class="res-row-v" id="r-pipval">—</span>
      </div>
      <div class="res-row">
        <span class="res-row-k">Contratto</span>
        <span class="res-row-v" id="r-contract">—</span>
      </div>
    </div>
  </div>

  <div class="spacer"></div>
</div>

<script>
const CFG = {
  XAUUSD: { name:'XAUUSD', label:'Gold',     contractSize:100,  pipSize:0.01, pipValPerLot:1,  unit:'oz',     precise:false },
  BTCUSD: { name:'BTCUSD', label:'Bitcoin',  contractSize:1,    pipSize:1,    pipValPerLot:1,  unit:'BTC',    precise:true  },
  USOIL:  { name:'USOIL.CASH', label:'Crude Oil', contractSize:1000, pipSize:0.01, pipValPerLot:10, unit:'barili', precise:false },
  US500:  { name:'US500.CASH', label:'S&P 500', contractSize:1, pipSize:0.1,  pipValPerLot:1,  unit:'index',  precise:true  }
};

let instrKey = null;

function pickInstr(el) {
  document.querySelectorAll('.instr-tile').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  instrKey = el.dataset.key;
}

function getRisk(key, lots, pipDist, pDiff) {
  if (key==='XAUUSD') return lots * pipDist * CFG[key].pipValPerLot;
  if (key==='BTCUSD') return lots * pDiff * CFG[key].contractSize;
  if (key==='USOIL')  return lots * pipDist * CFG[key].pipValPerLot;
  if (key==='US500')  return lots * pDiff * CFG[key].contractSize;
}

function err(m) {
  document.getElementById('err-msg').textContent = m;
  document.getElementById('err-bar').classList.add('show');
}

function calculate() {
  document.getElementById('err-bar').classList.remove('show');
  document.getElementById('res-card').classList.remove('show');

  const capital = parseFloat(document.getElementById('capital').value);
  const riskPct = parseFloat(document.getElementById('risk').value);
  const entry   = parseFloat(document.getElementById('entry').value);
  const exitP   = parseFloat(document.getElementById('exitp').value);

  if (!instrKey)                return err('Seleziona uno strumento.');
  if (!capital || capital <= 0) return err('Inserisci un capitale valido.');
  if (!riskPct || riskPct <= 0) return err('Inserisci un risk % valido (es. 1.00).');
  if (!entry || entry <= 0)     return err('Inserisci un entry price.');
  if (!exitP || exitP <= 0)     return err('Inserisci uno SL / exit price.');
  if (entry === exitP)          return err('Entry e SL non possono coincidere.');

  const c        = CFG[instrKey];
  const dollarR  = capital * riskPct / 100;
  const pDiff    = Math.abs(entry - exitP);

  let pipDist, lotsRaw;
  if (instrKey==='XAUUSD') { pipDist=pDiff/c.pipSize; lotsRaw=dollarR/(pipDist*c.pipValPerLot); }
  if (instrKey==='BTCUSD') { pipDist=pDiff;            lotsRaw=dollarR/(pDiff*c.contractSize); }
  if (instrKey==='USOIL')  { pipDist=pDiff/c.pipSize;  lotsRaw=dollarR/(pipDist*c.pipValPerLot); }
  if (instrKey==='US500')  { pipDist=pDiff/c.pipSize;  lotsRaw=dollarR/(pDiff*c.contractSize); }

  let lots, actualR, note = '';
  if (c.precise) {
    lots   = Math.round(lotsRaw * 100) / 100;
    actualR = getRisk(instrKey, lots, pipDist, pDiff);
  } else {
    const step = 0.01;
    const ld = Math.floor(lotsRaw / step) * step;
    const lu = +(ld + step).toFixed(4);
    const rd = getRisk(instrKey, ld, pipDist, pDiff);
    const ru = getRisk(instrKey, lu, pipDist, pDiff);
    if (Math.abs(ru - dollarR) <= Math.abs(rd - dollarR)) {
      lots=lu; actualR=ru; note='↑ arrotondato su — più vicino al target';
    } else {
      lots=ld; actualR=rd; note='↓ arrotondato giù — più vicino al target';
    }
  }

  let pipValTxt, pipDistTxt;
  if (instrKey==='XAUUSD') { pipValTxt='$1.00 / pip per lot'; pipDistTxt=pipDist.toFixed(0)+' pips ($'+pDiff.toFixed(2)+')'; }
  if (instrKey==='BTCUSD') { pipValTxt='$1.00 / $1 move per lot'; pipDistTxt='$'+pDiff.toFixed(2); }
  if (instrKey==='USOIL')  { pipValTxt='$10.00 / pip per lot'; pipDistTxt=pipDist.toFixed(0)+' pips ($'+pDiff.toFixed(2)+')'; }
  if (instrKey==='US500')  { pipValTxt='$1.00 / punto per lot'; pipDistTxt=pDiff.toFixed(1)+' punti'; }

  document.getElementById('res-lot').textContent    = lots.toFixed(2);
  document.getElementById('res-risk').textContent   = '$'+actualR.toFixed(2);
  document.getElementById('r-instr').textContent    = c.name+' — '+c.label;
  document.getElementById('r-pips').textContent     = pipDistTxt;
  document.getElementById('r-pipval').textContent   = pipValTxt;
  document.getElementById('r-contract').textContent = c.contractSize+' '+c.unit+' / lot';

  const noteEl = document.getElementById('res-note');
  noteEl.textContent   = note;
  noteEl.style.display = note ? 'block' : 'none';

  document.getElementById('res-card').classList.add('show');
  setTimeout(() => document.getElementById('res-card').scrollIntoView({behavior:'smooth', block:'nearest'}), 80);
}

function resetAll() {
  instrKey = null;
  document.querySelectorAll('.instr-tile').forEach(t => t.classList.remove('active'));
  ['capital','risk','entry','exitp'].forEach(id => document.getElementById(id).value='');
  document.getElementById('err-bar').classList.remove('show');
  document.getElementById('res-card').classList.remove('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

document.addEventListener('keydown', e => { if (e.key==='Enter') calculate(); });
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/sw.js");}</script>
</body>
</html>
